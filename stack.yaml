services:
  app:
    image: ${IMAGE_REPO}:${GIT_COMMIT_HASH:-latest}
    user: "0:0"
    networks:
      - frontend
    deploy:
      placement:
        constraints:
          - node.hostname == vps2
    depends_on:
      - db
    secrets:
      - ${STACK_NAME}_env
    volumes:
      - ${STACK_NAME}_app_uploads:/app/uploads

  migrations:
    image: ${IMAGE_REPO}:${GIT_COMMIT_HASH:-latest}-migrate
    networks:
      - frontend
    secrets:
      - ${STACK_NAME}_env
    deploy:
      placement:
        constraints:
          - node.hostname == vps2
      replicas: 0
      restart_policy:
        condition: none

  db:
    image: postgres:16
    environment:
      POSTGRES_USER_FILE: /run/secrets/${STACK_NAME}_db-user
      POSTGRES_PASSWORD_FILE: /run/secrets/${STACK_NAME}_db-pw
      POSTGRES_DB_FILE: /run/secrets/${STACK_NAME}_db-name
    secrets:
      - ${STACK_NAME}_db-user
      - ${STACK_NAME}_db-pw
      - ${STACK_NAME}_db-name
    volumes:
      - ${STACK_NAME}_db:/var/lib/postgresql/data
    networks:
      - frontend
    deploy:
      placement:
        constraints:
          - node.hostname == vps2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
networks:
  frontend:
    external: true

volumes:
  ${STACK_NAME}_db:
  ${STACK_NAME}_app_uploads:

secrets:
  ${STACK_NAME}_env:
    external: true
  ${STACK_NAME}_db-user:
    external: true
  ${STACK_NAME}_db-pw:
    external: true
  ${STACK_NAME}_db-name:
    external: true
