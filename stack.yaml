services:
  app:
    image: ${IMAGE_REPO:-ghcr.io/your-org/minimal-payload-mui}:${GIT_COMMIT_HASH:-latest}
    user: "0:0"
    networks:
      - frontend
    deploy:
      placement:
        constraints:
          - node.hostname == vps2
    depends_on:
      - db
    secrets:
      - minimal-payload-mui_env
    volumes:
      - minimal_payload_mui_app_uploads:/app/uploads

  migrations:
    image: ${IMAGE_REPO:-ghcr.io/your-org/minimal-payload-mui}:${GIT_COMMIT_HASH:-latest}-migrate
    networks:
      - frontend
    secrets:
      - minimal-payload-mui_env
    deploy:
      placement:
        constraints:
          - node.hostname == vps2
      replicas: 0
      restart_policy:
        condition: none

  db:
    image: postgres:16
    environment:
      POSTGRES_USER_FILE: /run/secrets/minimal-payload-mui_db-user
      POSTGRES_PASSWORD_FILE: /run/secrets/minimal-payload-mui_db-pw
      POSTGRES_DB_FILE: /run/secrets/minimal-payload-mui_db-name
    secrets:
      - minimal-payload-mui_db-user
      - minimal-payload-mui_db-pw
      - minimal-payload-mui_db-name
    volumes:
      - minimal_payload_mui_db:/var/lib/postgresql/data
    networks:
      - frontend
    deploy:
      placement:
        constraints:
          - node.hostname == vps2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
networks:
  frontend:
    external: true

volumes:
  minimal_payload_mui_db:
  minimal_payload_mui_app_uploads:

secrets:
  minimal-payload-mui_env:
    external: true
  minimal-payload-mui_db-user:
    external: true
  minimal-payload-mui_db-pw:
    external: true
  minimal-payload-mui_db-name:
    external: true
