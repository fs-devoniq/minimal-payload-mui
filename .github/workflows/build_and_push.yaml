name: build-and-push-image
on:
  push:
    branches:
      - "main"

permissions:
  packages: write
  contents: read

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to the Container registry
        uses: docker/login-action@v3
        with:
          registry: https://ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Get Meta
        id: meta
        run: |
          echo "REPO_NAME=${GITHUB_REPOSITORY#*/}" >> $GITHUB_OUTPUT
          echo "IMAGE_REPO=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: runner
          push: true
          tags: |
            ${{ steps.meta.outputs.IMAGE_REPO }}:latest
            ${{ steps.meta.outputs.IMAGE_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push migrate image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: migration
          push: true
          tags: |
            ${{ steps.meta.outputs.IMAGE_REPO }}:migrate-latest
            ${{ steps.meta.outputs.IMAGE_REPO }}:${{ github.sha }}-migrate
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build-and-push-image
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Get Meta
        id: meta
        run: |
          echo "REPO_NAME=${GITHUB_REPOSITORY#*/}" >> $GITHUB_OUTPUT
          echo "IMAGE_REPO=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Login to the Container registry
        uses: docker/login-action@v3
        with:
          registry: https://ghcr.io
          username: ${{ secrets.DOCKER_PULL_USERNAME }}
          password: ${{ secrets.DOCKER_PULL_SECRET }}

      - name: SSH Key adden
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Deploy image
        env:
          DOCKER_HOST: "ssh://${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          GIT_COMMIT_HASH: ${{ github.sha }}
          STACK_NAME: ${{ steps.meta.outputs.REPO_NAME }}
          IMAGE_REPO: ${{ steps.meta.outputs.IMAGE_REPO }}
          DOCKER_PULL_USERNAME: ${{ secrets.DOCKER_PULL_USERNAME }}
          DOCKER_PULL_SECRET: ${{ secrets.DOCKER_PULL_SECRET }}
          # Diese Secrets müssen in den GitHub Repository Settings angelegt werden
          ENV_PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          echo "$DOCKER_PULL_SECRET" | docker login ghcr.io -u "$DOCKER_PULL_USERNAME" --password-stdin
          docker pull "${IMAGE_REPO}:${GIT_COMMIT_HASH}"
          docker pull "${IMAGE_REPO}:${GIT_COMMIT_HASH}-migrate"

          # Helper Funktion für sicheres Secret-Management
          create_or_update_secret() {
            local secret_name=$1
            local secret_value=$2
            
            # Prüfen ob Secret existiert
            if docker secret inspect "$secret_name" >/dev/null 2>&1; then
              echo "Secret $secret_name existiert bereits. Versuch es zu löschen..."
              # Löschen schlägt fehl, wenn ein Service es gerade benutzt
              if ! docker secret rm "$secret_name"; then
                echo "Warnung: Secret $secret_name wird aktuell verwendet und kann nicht aktualisiert werden."
                return 0
              fi
            fi
            
            # Neues Secret anlegen
            echo "$secret_value" | docker secret create "$secret_name" -
            echo "Secret $secret_name erfolgreich angelegt."
          }

          echo "Bereite Docker Secrets vor..."
          
          # DATABASE_URL dynamisch aus den anderen DB-Werten zusammenbauen
          # Format: postgres://USER:PASSWORD@HOST:PORT/DATABASE
          # Host '${STACK_NAME}_db' entspricht dem Service-Namen im Swarm-Netzwerk
          DYNAMIC_DATABASE_URL="postgres://${DB_USER}:${DB_PASSWORD}@${STACK_NAME}_db:5432/${DB_NAME}"
          
          # App Environment Secret zusammenbauen
          APP_ENV="PAYLOAD_SECRET=${ENV_PAYLOAD_SECRET}
          DATABASE_URL=${DYNAMIC_DATABASE_URL}"
          
          # Secrets anlegen
          create_or_update_secret "${STACK_NAME}_env" "$APP_ENV"
          create_or_update_secret "${STACK_NAME}_db-user" "$DB_USER"
          create_or_update_secret "${STACK_NAME}_db-pw" "$DB_PASSWORD"
          create_or_update_secret "${STACK_NAME}_db-name" "$DB_NAME"

          # YAML-Datei rendern, da 'docker stack deploy' keine Variablen in Top-Level-Keys (volumes/secrets) erlaubt
          # Da wir lokal (in der Action) sind, können wir envsubst nutzen
          envsubst < stack.yaml > stack-rendered.yaml

          docker stack deploy -c stack-rendered.yaml --with-registry-auth $STACK_NAME
          docker service update --detach=true --image "${IMAGE_REPO}:${GIT_COMMIT_HASH}-migrate" ${STACK_NAME}_migrations
          docker service scale --detach=true ${STACK_NAME}_migrations=1

          MIGRATION_OK=0
          for i in $(seq 1 60); do
            STATE=$(docker service ps ${STACK_NAME}_migrations --no-trunc --format '{{.CurrentState}}|{{.Error}}' | head -n 1)
            echo "migrate-state: $STATE"

            if echo "$STATE" | grep -q '^Complete'; then
              MIGRATION_OK=1
              echo "Migration finished successfully."
              break
            fi

            if echo "$STATE" | grep -Eq '^(Failed|Rejected|Shutdown)'; then
              echo "Migration service failed."
              docker service logs ${STACK_NAME}_migrations || true
              docker service scale --detach=true ${STACK_NAME}_migrations=0 || true
              exit 1
            fi

            sleep 5
          done

          if [ "$MIGRATION_OK" -ne 1 ]; then
            echo "Migration did not finish in time."
            docker service logs ${STACK_NAME}_migrations || true
            docker service scale --detach=true ${STACK_NAME}_migrations=0 || true
            exit 1
          fi

          docker service scale --detach=true ${STACK_NAME}_migrations=0
          docker service update --detach=true --image "${IMAGE_REPO}:${GIT_COMMIT_HASH}" ${STACK_NAME}_app
